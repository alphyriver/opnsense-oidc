name: 🧪 Lint & Test

# Forgejo pipeline: fast PHP lint + unit tests. The FreeBSD package build lives
# only in .github/workflows/build.yml, because booting a FreeBSD VM
# (vmactions/freebsd-vm) needs sudo + qemu + /dev/kvm in a privileged container,
# which the stock node-container act_runner does not provide. GitHub's hosted
# ubuntu-latest runners do, so the authoritative package + artifact is built on
# the mirror. See CONTRIBUTING.md ("Enabling FreeBSD builds on Forgejo") to move
# the build here later on a dedicated KVM-capable runner.
#
# The job is guarded on github.server_url so that on Forgejo (which also reads
# .github/workflows) only this file runs, and on the GitHub mirror only the
# .github file runs — exactly one test run per platform.
#
# NOTE: Forgejo resolves `uses:` from code.forgejo.org by default, where only
# the `actions/*` set is mirrored. GitHub-hosted actions (setup-php) must be
# referenced by full https://github.com URL here.

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    if: ${{ github.server_url != 'https://github.com' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: https://github.com/shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          tools: composer

      - name: Lint PHP sources
        run: find src -name '*.php' -print0 | xargs -0 -n1 -P4 php -l

      - name: Install dev dependencies
        run: composer install --no-interaction --no-progress

      - name: Run unit tests
        run: composer test
