name: 🔄 Vendor update (OIDC library)

# Tracks the vendored OIDC client library (lib/) against upstream. Weekly, it
# re-runs scripts/vendor-update.sh; if a newer upstream release exists it
# re-vendors the files and opens a PR for human review. It never merges itself —
# a security-sensitive auth dependency on a firewall warrants a human merge.
#
# Forgejo-only (the firewall repo is the source of truth; GitHub is a downstream
# push-mirror). Guarded on github.server_url so it never runs on the mirror.
#
# Token: uses secrets.VENDOR_UPDATE_TOKEN if set (a PAT with repo + PR write),
# otherwise the automatic job token. If PR creation 403s, add VENDOR_UPDATE_TOKEN.

on:
  schedule:
    - cron: '0 6 * * 1'   # Mondays 06:00 UTC; upstream release cadence is low
  workflow_dispatch: {}

jobs:
  vendor-update:
    if: ${{ github.server_url != 'https://github.com' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install tools
        run: apt-get update && apt-get install -y --no-install-recommends jq curl ca-certificates

      - name: Re-vendor if upstream moved
        id: vendor
        run: |
          sh scripts/vendor-update.sh
          if [ -n "$(git status --porcelain)" ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "version=$(jq -r .version vendor-lock.json)" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Open pull request
        if: steps.vendor.outputs.changed == 'true'
        env:
          TOKEN: ${{ secrets.VENDOR_UPDATE_TOKEN || github.token }}
          SERVER: ${{ github.server_url }}
          REPO: ${{ github.repository }}
          VER: ${{ steps.vendor.outputs.version }}
        run: |
          set -eu
          branch="vendor/oidc-lib-${VER}"
          git config user.name "vendor-bot"
          git config user.email "vendor-bot@users.noreply.localhost"
          git checkout -b "$branch"
          git add -A
          git commit -m "chore(deps): re-vendor OIDC library ${VER}"
          git push "https://x-access-token:${TOKEN}@${SERVER#https://}/${REPO}.git" "$branch"
          curl -fsSL -X POST \
            -H "Authorization: token ${TOKEN}" \
            -H "Content-Type: application/json" \
            "${SERVER}/api/v1/repos/${REPO}/pulls" \
            -d "$(jq -n --arg b "$branch" --arg v "$VER" '{
                  head: $b, base: "main",
                  title: ("chore(deps): re-vendor OIDC library " + $v),
                  body: ("Automated re-vendor of the OIDC client library to " + $v + ".\n\nReview the diff and confirm the vendor-lock.json checksums before merging. CI lint/tests run on this PR.")
                }')"
