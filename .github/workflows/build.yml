name: 📦 Build & Test

# Runs on the GitHub mirror only. The same logic lives in
# .forgejo/workflows/build.yml for Forgejo. Both files are gated on
# github.server_url so each platform executes the pipeline exactly once
# (Forgejo also reads .github/workflows, hence the guard here).

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  PLUGIN_NAME: oidc
  PLUGIN_CATEGORY: devel

jobs:
  # Fast PHP unit tests for pure-logic functions. No FreeBSD/OPNsense runtime
  # needed, so this runs directly on Linux and gates PRs cheaply.
  test:
    if: ${{ github.server_url == 'https://github.com' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          tools: composer

      - name: Lint PHP sources
        run: find src -name '*.php' -print0 | xargs -0 -n1 -P4 php -l

      - name: Install dev dependencies
        run: composer install --no-interaction --no-progress

      - name: Run unit tests
        run: composer test

  # Builds the actual OPNsense package on FreeBSD (matches OPNsense 25.7 /
  # FreeBSD 14.3). vmactions/freebsd-vm needs nested virtualization (/dev/kvm).
  build:
    if: ${{ github.server_url == 'https://github.com' }}
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout opnsense/plugins (build root)
        run: git clone --depth 1 https://github.com/opnsense/plugins.git ${GITHUB_WORKSPACE}

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          path: ${{ env.PLUGIN_CATEGORY }}/${{ env.PLUGIN_NAME }}

      - name: Build package in FreeBSD
        uses: vmactions/freebsd-vm@v1
        with:
          envs: 'PLUGIN_NAME PLUGIN_CATEGORY'
          usesh: true
          release: "14.3"
          prepare: |
            pkg install -y git gmake
          run: |
            cd $PLUGIN_CATEGORY/$PLUGIN_NAME
            make package

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: os-${{ env.PLUGIN_NAME }}
          path: ${{ env.PLUGIN_CATEGORY }}/${{ env.PLUGIN_NAME }}/work/pkg/*.pkg
          if-no-files-found: error
