name: 📦 Build & Test

# GitHub is the canonical CI/release platform for this repo; Forgejo is a
# read-only pull mirror that does not run CI. This single workflow runs the fast
# PHP lint/unit tests and the authoritative FreeBSD package build.

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  PLUGIN_NAME: oidc
  PLUGIN_CATEGORY: devel

jobs:
  # Verifies the vendored OIDC library against vendor-lock.json: committed lib/
  # matches the recorded patched checksums, the pinned upstream matches its
  # pristine checksums, and upstream + patches/ re-derives the committed files
  # exactly. Fails if a local security patch (e.g. JWE RSA1_5 removal) drifts or
  # a lib/ file was hand-edited instead of patched.
  vendor:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1

      - name: Verify vendored library + patches
        run: sh scripts/vendor-verify.sh

  # Fast PHP unit tests for pure-logic functions. No FreeBSD/OPNsense runtime
  # needed, so this runs directly on Linux and gates PRs cheaply.
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1

      - name: Setup PHP
        uses: shivammathur/setup-php@f3e473d116dcccaddc5834248c87452386958240  # v2.37.2
        with:
          php-version: '8.3'
          tools: composer

      - name: Lint PHP sources
        run: find src -name '*.php' -print0 | xargs -0 -n1 -P4 php -l

      - name: Install dev dependencies
        run: composer install --no-interaction --no-progress

      - name: Run unit tests
        run: composer test

  # Builds the actual OPNsense package on FreeBSD (matches OPNsense 25.7 /
  # FreeBSD 14.3). vmactions/freebsd-vm needs nested virtualization (/dev/kvm).
  build:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout opnsense/plugins (build root)
        run: git clone --depth 1 https://github.com/opnsense/plugins.git "${GITHUB_WORKSPACE}"

      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1
        with:
          path: ${{ env.PLUGIN_CATEGORY }}/${{ env.PLUGIN_NAME }}

      - name: Build package in FreeBSD
        uses: vmactions/freebsd-vm@b84ab5559b5a1bb4b8ee2737d2506a16e1737636  # v1.4.8
        with:
          envs: 'PLUGIN_NAME PLUGIN_CATEGORY'
          usesh: true
          release: "14.3"
          prepare: |
            # The stock FreeBSD-kmods repo 404s for this ABI's quarterly branch,
            # which makes pkg's catalogue update (and thus install) fail. We only
            # need git/gmake from the main FreeBSD repo, so disable kmods.
            mkdir -p /usr/local/etc/pkg/repos
            echo 'FreeBSD-kmods: { enabled: no }' > /usr/local/etc/pkg/repos/FreeBSD-kmods.conf
            pkg install -y git gmake
          run: |
            cd $PLUGIN_CATEGORY/$PLUGIN_NAME
            make package

      - name: Upload artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4.6.2
        with:
          name: os-${{ env.PLUGIN_NAME }}
          path: ${{ env.PLUGIN_CATEGORY }}/${{ env.PLUGIN_NAME }}/work/pkg/*.pkg
          if-no-files-found: error

  # Real OIDC handshake against a live Keycloak: discovery, PAR, auth-code+PKCE,
  # token exchange, JWKS signature verification, ID-token + claim/group
  # extraction — the parts that regress on a vendored-library bump and that the
  # pure-logic unit tests cannot reach. Drives the SAME vendored client the
  # plugin ships (tests/integration/OidcHandshakeTest.php).
  integration:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1

      - name: Setup PHP
        uses: shivammathur/setup-php@f3e473d116dcccaddc5834248c87452386958240  # v2.37.2
        with:
          php-version: '8.3'
          extensions: curl, mbstring
          tools: composer

      - name: Install dev dependencies
        run: composer install --no-interaction --no-progress

      - name: Start Keycloak (import test realm)
        run: |
          docker run -d --name keycloak -p 8080:8080 \
            -e KC_BOOTSTRAP_ADMIN_USERNAME=admin \
            -e KC_BOOTSTRAP_ADMIN_PASSWORD=admin \
            -v "$PWD/tests/integration/keycloak-realm.json:/opt/keycloak/data/import/realm.json:ro" \
            quay.io/keycloak/keycloak:26.0 start-dev --import-realm

      - name: Wait for Keycloak
        run: |
          for i in $(seq 1 60); do
            if [ "$(curl -s -o /dev/null -w '%{http_code}' http://localhost:8080/realms/test/.well-known/openid-configuration)" = "200" ]; then
              echo "Keycloak ready after $((i*3))s"; exit 0
            fi
            sleep 3
          done
          echo "::error::Keycloak did not become ready"; docker logs keycloak; exit 1

      - name: Run integration test
        env:
          OIDC_PROVIDER_URL: http://localhost:8080/realms/test
          OIDC_CLIENT_ID: oidc-test
          OIDC_CLIENT_SECRET: test-secret
          OIDC_USERNAME: testuser
          OIDC_PASSWORD: testpass
          OIDC_REDIRECT_URI: http://localhost/callback
        run: composer test:integration
