name: 🚀 Release

# Cuts a release when a v* tag is pushed: builds the signed OPNsense package,
# (re)generates the GitHub Pages pkg feed, and publishes a GitHub Release with
# the .pkg attached.
#
# GitHub is the source of truth for releases (Forgejo is a pull mirror), so this
# lives only under .github and is guarded on github.server_url for safety.
#
# Required repository setup (one-time):
#   - Secret  PKG_SIGNING_KEY : the RSA private key (PEM) whose public half is
#                               committed at deploy/repo/oidc.pub.
#   - Pages   Settings → Pages → Source: "Deploy from a branch" → gh-pages / root.

on:
  push:
    tags: [ 'v*' ]
  # Manual fallback: when the release tag is created by release-please with the
  # default GITHUB_TOKEN, GitHub does not auto-trigger this workflow (a tag pushed
  # by GITHUB_TOKEN can't start another run). Run it by hand against the tag:
  #   gh workflow run release.yml --ref vX.Y.Z
  # (GITHUB_REF_NAME resolves to the tag, so the version check + build are identical.)
  workflow_dispatch: {}

permissions:
  contents: write   # create the Release and push the gh-pages feed branch

concurrency:
  group: release-feed
  cancel-in-progress: false

env:
  PLUGIN_NAME: oidc
  PLUGIN_CATEGORY: devel
  ABI: "FreeBSD:14:amd64"

jobs:
  release:
    if: ${{ github.server_url == 'https://github.com' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout opnsense/plugins (build root)
        run: git clone --depth 1 https://github.com/opnsense/plugins.git build

      - name: Checkout plugin source
        uses: actions/checkout@v4
        with:
          path: build/${{ env.PLUGIN_CATEGORY }}/${{ env.PLUGIN_NAME }}

      - name: Checkout existing feed (gh-pages)
        uses: actions/checkout@v4
        continue-on-error: true   # absent on the very first release
        with:
          ref: gh-pages
          path: site

      - name: Verify tag matches plugin version
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          # A prerelease tag (e.g. 1.0.0-rc.1) is validated against its base
          # version: the Makefile / package version stays 1.0.0; the -rc.N only
          # marks a release-candidate build (see "Release candidates" in the docs).
          BASE="${TAG%%-*}"
          # Strip the release-please marker comment, then whitespace.
          MK=$(awk -F'=' '/^PLUGIN_VERSION/{v=$2; sub(/#.*/,"",v); gsub(/[ \t]/,"",v); print v}' \
               "build/${PLUGIN_CATEGORY}/${PLUGIN_NAME}/Makefile")
          echo "tag=$TAG base=$BASE makefile=$MK"
          test "$BASE" = "$MK" || { echo "::error::tag v$TAG (base $BASE) != Makefile PLUGIN_VERSION $MK"; exit 1; }

      - name: Stage signing key
        env:
          SIGNING_KEY: ${{ secrets.PKG_SIGNING_KEY }}
        run: |
          if [ -z "$SIGNING_KEY" ]; then echo "::error::PKG_SIGNING_KEY secret is not set"; exit 1; fi
          umask 077
          printf '%s\n' "$SIGNING_KEY" > signing.key

      - name: Build package and sign the feed (FreeBSD)
        uses: vmactions/freebsd-vm@v1
        with:
          envs: 'PLUGIN_NAME PLUGIN_CATEGORY ABI'
          usesh: true
          release: "14.3"
          prepare: |
            # The stock FreeBSD-kmods repo 404s for this ABI's quarterly branch,
            # which makes pkg's catalogue update (and thus install) fail. We only
            # need git/gmake from the main FreeBSD repo, so disable kmods.
            mkdir -p /usr/local/etc/pkg/repos
            echo 'FreeBSD-kmods: { enabled: no }' > /usr/local/etc/pkg/repos/FreeBSD-kmods.conf
            pkg install -y git gmake
          run: |
            set -e
            WS=$(pwd)
            mkdir -p "$WS/dist" "$WS/site/${ABI}"
            cd "build/${PLUGIN_CATEGORY}/${PLUGIN_NAME}"
            # PLUGIN_DEVEL= produces the clean "os-oidc" package (tier 3) rather
            # than the development "os-oidc-devel" build.
            make PLUGIN_DEVEL= package
            PKG=$(ls work/pkg/os-${PLUGIN_NAME}-*.pkg | head -1)
            cp "$PKG" "$WS/dist/"
            cp "$PKG" "$WS/site/${ABI}/"
            # Regenerate (and RSA-sign) the catalogue over every .pkg in the feed
            # so older versions stay installable for upgrades.
            pkg repo "$WS/site/${ABI}" "rsa:$WS/signing.key"

      - name: Render feed metadata (conf, key, landing page)
        run: |
          rm -f signing.key
          OWNER=$(echo "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')
          REPO="${GITHUB_REPOSITORY#*/}"
          PAGES_URL="https://${OWNER}.github.io/${REPO}"
          REPO_URL="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}"
          VERSION="${GITHUB_REF_NAME#v}"
          SRC="build/${PLUGIN_CATEGORY}/${PLUGIN_NAME}/deploy/repo"

          # Repo conf + published copy of the signing public key.
          sed "s#@PAGES_URL@#${PAGES_URL}#g" "${SRC}/oidc.conf.in" > site/oidc.conf
          cp "${SRC}/oidc.pub" site/pkg-repo.pub
          KEY_SHA256=$(sha256sum site/pkg-repo.pub | cut -d' ' -f1)

          # Stylish landing page (template lives in deploy/repo/index.html.in).
          sed -e "s#@PAGES_URL@#${PAGES_URL}#g" \
              -e "s#@REPO_URL@#${REPO_URL}#g" \
              -e "s#@REPO_SLUG@#${GITHUB_REPOSITORY}#g" \
              -e "s#@VERSION@#${VERSION}#g" \
              -e "s#@ABI@#${ABI}#g" \
              -e "s#@KEY_SHA256@#${KEY_SHA256}#g" \
              "${SRC}/index.html.in" > site/index.html
          echo "feed contents:"; ls -R site | head -40

      # Production feed gets STABLE releases only. A prerelease tag (e.g.
      # v1.0.0-rc.1) still builds + signs the package and ships it as a GitHub
      # pre-release for firewall validation, but does not touch the live feed —
      # so the feed never carries two packages at the same base version.
      - name: Publish feed to GitHub Pages
        if: ${{ !contains(github.ref_name, '-') }}
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./site
          publish_branch: gh-pages
          keep_files: false
          commit_message: "release: ${{ github.ref_name }} feed update"

      # Use the release-please-maintained CHANGELOG as the single source of
      # release notes (its top section). Avoids GitHub's auto-generated notes,
      # which compare against the previous tag — uninformative for a stable cut
      # that immediately follows its own release candidate.
      - name: Extract release notes from CHANGELOG
        run: |
          CL="build/${PLUGIN_CATEGORY}/${PLUGIN_NAME}/CHANGELOG.md"
          if [ -f "$CL" ]; then
            awk '/^## /{n++} n==1{print} n==2{exit}' "$CL" > release-notes.md
          fi
          [ -s release-notes.md ] || printf 'See CHANGELOG.md for details.\n' > release-notes.md
          echo "---- release notes ----"; cat release-notes.md

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.pkg
          body_path: release-notes.md
          fail_on_unmatched_files: true
          prerelease: ${{ contains(github.ref_name, '-') }}
