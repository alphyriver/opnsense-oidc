name: 🔄 Vendor update (OIDC library)

# Tracks the vendored OIDC client library (lib/) against upstream. Weekly, it
# re-runs scripts/vendor-update.sh; if a newer upstream release exists it
# re-vendors the files and opens a PR for human review. It never merges itself —
# a security-sensitive auth dependency on a firewall warrants a human merge.
#
# Note on CI gating the PR: a PR opened with the default GITHUB_TOKEN does not
# trigger the build/test workflow (GitHub's loop-prevention). To have CI run on
# the vendor PR automatically, set a VENDOR_UPDATE_TOKEN secret (a fine-grained
# PAT with contents + pull-requests write); otherwise re-run CI manually on the PR.

on:
  schedule:
    - cron: '0 6 * * 1'   # Mondays 06:00 UTC; upstream release cadence is low
  workflow_dispatch: {}

permissions:
  contents: write
  pull-requests: write

jobs:
  vendor-update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1

      - name: Re-vendor if upstream moved
        id: vendor
        run: |
          sh scripts/vendor-update.sh
          if [ -n "$(git status --porcelain)" ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "version=$(jq -r .version vendor-lock.json)" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Open pull request
        if: steps.vendor.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.VENDOR_UPDATE_TOKEN || github.token }}
          VER: ${{ steps.vendor.outputs.version }}
        run: |
          set -eu
          branch="vendor/oidc-lib-${VER}"
          git config user.name "vendor-bot"
          git config user.email "vendor-bot@users.noreply.github.com"
          git checkout -b "$branch"
          git add -A
          git commit -m "chore(deps): re-vendor OIDC library ${VER}"
          git push origin "$branch"
          gh pr create \
            --base main --head "$branch" \
            --title "chore(deps): re-vendor OIDC library ${VER}" \
            --body "Automated re-vendor of the OIDC client library to ${VER}.

          Review the diff and confirm the \`vendor-lock.json\` checksums before merging. CI lint/tests run on this PR when a VENDOR_UPDATE_TOKEN PAT is configured (see workflow header)."
